site_name: GitAuditor
site_description: AI-powered Intelligent Code Infrastructure Catalog
site_author: Renan Fernandes
site_url: https://refernandes.github.io/gitauditor
repo_name: refernandes/gitauditor
repo_url: https://github.com/refernandes/gitauditor
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Commands:
    - Catalog: commands/catalog.md
    - Policy: commands/policy.md
    - Repo: commands/repo.md
    - Worktree: commands/worktree.md
    - SSH: commands/ssh.md
  - Architecture: architecture.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
